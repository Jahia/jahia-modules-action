name: Create a Security checklist
description: Create a Security checklist sub-issue from .github/ISSUE_TEMPLATE/security-checks.md

inputs:
  github_token:
    description: 'GitHub personal API token'
    required: true

runs:
  using: "composite"
  steps:
    - name: Create a Security checklist for every new Epic
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        github-token: ${{ inputs.github_token }}
        retries: 3
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const parentIssueNumber = context.payload.issue.number;
          const templatePath = '.github/ISSUE_TEMPLATE/security-checks.md';

          let body;
          try {
            const templateFile = await github.rest.repos.getContent({
              owner,
              repo,
              path: templatePath
            });

            const rawTemplate = Buffer.from(templateFile.data.content, 'base64').toString('utf8');

            // Remove optional front matter block delimited by --- (handle both LF and CRLF)
            body = rawTemplate.replace(/^---[\s\S]*?---(\r?\n)?/, '').trim();
          } catch (error) {
            core.setFailed(`Unable to load template ${templatePath}: ${error.message}`);
            return;
          }
          let created;
          try {
            created = await github.rest.issues.create({
              owner,
              repo,
              title: 'Security checklist for feature development',
              body,
              labels: ['Area:Security']
            });
          } catch (error) {
            core.setFailed(`Unable to create security checklist issue: ${error.message}`);
            return;
          }

          try {
            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
              owner,
              repo,
              issue_number: parentIssueNumber,
              sub_issue_id: created.data.id
            });
            core.info(`Created sub-issue #${created.data.number} from template ${templatePath}`);
          } catch (error) {
            core.warning(`Created issue #${created.data.number} from template ${templatePath} but could not attach it as sub-issue of #${parentIssueNumber}: ${error.message}`);
          }
