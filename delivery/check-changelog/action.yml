name: Check Changelog
description: |
  Checks that a changelog entry has been added to the PR.

  The check is skipped (passes) when any of the following conditions are met:
    1. The PR has a label containing "no" and "changelog" (e.g. "🗒️ no-changelog")
    2. The repository is in the chachalog whitelist
    3. ALL changed files match the changelog_exempt_paths patterns
       (e.g. only CI, tests, or docs were modified)

  When the check is NOT skipped, it verifies that at least one file was added
  or modified inside the changelog directory (default: .chachalog/).

inputs:
  changelog-directory:
    description: The path to the changelog directory
    default: '.chachalog'
  changelog_exempt_paths:
    description: |
      Comma-separated list of glob patterns identifying files that do NOT
      require a changelog entry. If ALL changed files match these patterns,
      the changelog check is skipped.

      If ANY changed file does NOT match these patterns, a changelog is required.

      This "exempt list" approach means new directories are covered by default
      (safer behavior) — only explicitly listed paths are exempt.

      Default: ".github/**, tests/**, docker-tests/**, **/*.md"
    required: false
    default: ".github/**, tests/**, docker-tests/**, **/*.md"

runs:
  using: composite
  steps:
    - name: Check if no-changelog label is present
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      id: check-no-changelog
      with:
        script: |
          const labels = context.payload.pull_request.labels.map(label => label.name);
          core.debug('Labels attached to the PR:')
          core.debug(JSON.stringify(labels, null, 2))

          const hasNoChangelogLabel = labels.some((label) => {
            const lcLabel = String(label).toLowerCase();
            return lcLabel.includes('no') && lcLabel.includes('changelog');
          });

          return hasNoChangelogLabel;

    - name: Is repo whitelisted?
      id: check-repo-whitelist
      if: steps.check-no-changelog.outputs.result == 'false'
      uses: jahia/jahia-modules-action/chachalog-is-whitelisted@v2
      with:
        repository: ${{ github.repository }}

    - name: Do changed files require a changelog?
      id: check-paths-require-changelog
      if: steps.check-no-changelog.outputs.result == 'false' && steps.check-repo-whitelist.outputs.whitelisted == 'false'
      uses: jahia/jahia-modules-action/chachalog-check-paths@v2
      with:
        changelog_exempt_paths: ${{ inputs.changelog_exempt_paths }}

    - name: Check if changelog has been updated in the PR
      if: >-
        steps.check-no-changelog.outputs.result == 'false'
        && steps.check-repo-whitelist.outputs.whitelisted == 'false'
        && steps.check-paths-require-changelog.outputs.changelog_required == 'true'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      id: check-changelog-updated
      with:
        script: |
          const changelogDir = '${{ inputs.changelog-directory }}';
          const prNumber = context.payload.pull_request.number;
          const filesChanged = await github.paginate(github.rest.pulls.listFiles, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: prNumber,
          });

          for (const file of filesChanged) {
            if (file.filename.startsWith(changelogDir + '/')) {
              return true;
            }
          }
          return false;

    - name: Fail if checks failed
      if: >-
        steps.check-no-changelog.outputs.result == 'false'
        && steps.check-repo-whitelist.outputs.whitelisted == 'false'
        && steps.check-paths-require-changelog.outputs.changelog_required == 'true'
        && steps.check-changelog-updated.outputs.result == 'false'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          const message = "Changelog has not been updated. Please update the changelog or add the '🗒️ no-changelog' label to skip this check.";
          core.setFailed(message);
