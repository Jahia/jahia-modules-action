name: Release Rollback
description: Rollback a release by using backup files perviously cached

inputs:
  mvn_settings_filepath:
    description: Filepath to the settings.xml file
    default: '.github/maven.settings.xml'
    required: false
  release_id:
    description: GitHub release ID
    required: true
  release_version:
    description: Version to release
    required: true
  git_user_name:
    description: Git user name
    default: 'Jahia CI'
    required: false
  git_user_email:
    description: Git user email
    default: 'jahia-ci@jahia.com'
    required: false
  ssh-private-key:
    description: 'Jahia-ci SSH key'
    required: true

runs:
  using: "composite"
  steps:
    - name: Install rsync
      shell: bash
      run: sudo -u root apt-get update && sudo -u root apt-get install rsync

    - name: Download the Maven release properties
      uses: jahia/jahia-modules-action/download-bastion@v2
      with:
        ssh-key: ${{ inputs.ssh-private-key }}
        path: .
        bastion-user: jahia-ci
        source-user: jahia-ci
        source-host: rqa1.int.jahia.com
        source-path: /data/shared/releases/releases/${{ inputs.github_slug }}/${{ inputs.release_version }}

    - name: Configure git
      shell: bash
      run: |
        git config user.email ${{ inputs.git_user_email }}
        git config user.name ${{ inputs.git_user_name }}

    - name: Rollback release
      shell: bash
      run: |
        if [ -f pom.xml.releaseBackup ] && [ -f release.properties ]; then
          mvn -B -s ${{ inputs.mvn_settings_filepath }} release:rollback
        else
          echo "Error: rollback artifacts don't exist"
          exit 1
        fi

    - name: Delete github tag ${{ inputs.release_version }}
      shell: bash
      run: |
        git tag --delete ${{ inputs.release_version }}
        git push origin :refs/tags/${{ inputs.release_version }}

