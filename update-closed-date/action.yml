name: Update Closed Date from issue.closed_at (Project v2)
description: Updates a Project v2 date field based on GitHub issue closed_at.
inputs:
  project_url:
    description: "GitHub Project v2 URL (e.g. https://github.com/orgs/Jahia/projects/31)"
    required: true
  field_name:
    description: "Project field name to update."
    required: false
    default: "Closed_Date"
  github_token:
    description: "GitHub token for API access"
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Update Project field (inline python)
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        PROJECT_URL: ${{ inputs.project_url }}
        FIELD_NAME: ${{ inputs.field_name }}
      run: |
        python - <<'PY'
        import json
        import os
        import re
        import urllib.request

        GITHUB_API = os.environ.get("GITHUB_API_URL", "https://api.github.com")
        GRAPHQL_URL = f"{GITHUB_API}/graphql"

        def graphql(token: str, query: str, variables: dict):
            req = urllib.request.Request(
                GRAPHQL_URL,
                data=json.dumps({"query": query, "variables": variables}).encode("utf-8"),
                headers={
                    "Authorization": f"Bearer {token}",
                    "Content-Type": "application/json",
                    "Accept": "application/vnd.github+json",
                },
                method="POST",
            )
            with urllib.request.urlopen(req) as resp:
                data = json.loads(resp.read().decode("utf-8"))
            if "errors" in data:
                raise RuntimeError(f"GraphQL errors: {data['errors']}")
            return data["data"]

        def parse_project_url(url: str):
            m = re.search(r"/(?P<ownerType>orgs|users)/(?P<ownerName>[^/]+)/projects/(?P<projectNumber>\d+)", url)
            if not m:
                raise RuntimeError(
                    f"Invalid project URL: {url}. Expected .../(orgs|users)/<owner>/projects/<number>"
                )
            owner_type = m.group("ownerType")
            owner_name = m.group("ownerName")
            project_number = int(m.group("projectNumber"))
            owner_type_query = "organization" if owner_type == "orgs" else "user"
            return owner_type_query, owner_name, project_number

        def main():
            token = os.environ["GITHUB_TOKEN"]
            project_url = os.environ["PROJECT_URL"]
            field_name = os.environ.get("FIELD_NAME", "Closed_Date")

            owner_type_query, project_owner_name, project_number = parse_project_url(project_url)

            event_path = os.environ["GITHUB_EVENT_PATH"]
            with open(event_path, "r", encoding="utf-8") as f:
                event = json.load(f)

            issue = event.get("issue")
            if not issue:
                print("No issue in payload, exiting.")
                return

            closed_at = issue.get("closed_at")  # ISO string or None
            date_value = closed_at[:10] if closed_at else None  # YYYY-MM-DD for Project date fields

            repo_full = os.environ["GITHUB_REPOSITORY"]  # owner/repo
            repo_owner, repo_name = repo_full.split("/", 1)
            issue_number = issue["number"]

            # 1) Get project id + field id
            project_q = f"""
            query($projectOwnerName: String!, $projectNumber: Int!) {{
              {owner_type_query}(login: $projectOwnerName) {{
                projectV2(number: $projectNumber) {{
                  id
                  fields(first: 100) {{
                    nodes {{
                      ... on ProjectV2FieldCommon {{ id name }}
                    }}
                  }}
                }}
              }}
            }}
            """
            pdata = graphql(token, project_q, {"projectOwnerName": project_owner_name, "projectNumber": project_number})
            project = pdata[owner_type_query]["projectV2"]
            if not project:
                raise RuntimeError("ProjectV2 not found")

            project_id = project["id"]
            field = next((f for f in project["fields"]["nodes"] if f and f.get("name") == field_name), None)
            if not field:
                raise RuntimeError(f'Field "{field_name}" not found in project')
            field_id = field["id"]

            # 2) Find project item for this issue
            item_q = """
            query($owner: String!, $repo: String!, $issueNumber: Int!) {
              repository(owner: $owner, name: $repo) {
                issue(number: $issueNumber) {
                  projectItems(first: 50) {
                    nodes { id project { id } }
                  }
                }
              }
            }
            """
            idata = graphql(token, item_q, {"owner": repo_owner, "repo": repo_name, "issueNumber": issue_number})
            items = idata["repository"]["issue"]["projectItems"]["nodes"]
            item = next((it for it in items if it["project"]["id"] == project_id), None)

            if not item:
                print("Issue is not in the target project, nothing to update.")
                return

            item_id = item["id"]

            # 3) Update field
            mut = """
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Date) {
              updateProjectV2ItemFieldValue(
                input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { date: $value }
                }
              ) {
                projectV2Item { id }
              }
            }
            """
            graphql(token, mut, {"projectId": project_id, "itemId": item_id, "fieldId": field_id, "value": date_value})
            print(f"Updated {field_name} to {date_value}")

        if __name__ == "__main__":
            main()
        PY
