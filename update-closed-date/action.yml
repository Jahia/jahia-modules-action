name: Update Closed Date from issue.closed_at (Project v2)
description: Updates a Project v2 date field based on GitHub issue closed_at.
inputs:
  project_url:
    description: "GitHub Project v2 URL (e.g. https://github.com/orgs/Jahia/projects/31)"
    required: true
  field_name:
    description: "Project field name to update."
    required: false
    default: "Closed_Date"
  github_token:
    description: "GitHub token for API access"
    required: true

runs:
  using: composite
  steps:
    - name: Update Project field
      uses: actions/github-script@v9.0.0
      env:
        projectUrl: ${{ inputs.project_url }}
        fieldName: ${{ inputs.field_name }}
      with:
        github-token: ${{ inputs.github_token }}
        result-encoding: string
        retries: 3
        script: |
          const { projectUrl, fieldName } = process.env

          const parseProjectUrl = (url) => {
            const match = url.match(/\/(?<ownerType>orgs|users)\/(?<ownerName>[^/]+)\/projects\/(?<projectNumber>\d+)/)
            if (!match?.groups) {
              throw new Error(
                `Invalid project URL: ${url}. Expected .../(orgs|users)/<owner>/projects/<number>`,
              )
            }

            return {
              ownerName: match.groups.ownerName,
              projectNumber: Number.parseInt(match.groups.projectNumber, 10),
              ownerTypeQuery: match.groups.ownerType === 'orgs' ? 'organization' : 'user',
            }
          }

          const graphql = async (query, variables, errorContext) => {
            try {
              return await github.graphql(query, variables)
            } catch (error) {
              core.info("Request failed:")
              core.info(JSON.stringify(error.request))
              throw new Error(`${errorContext}: ${error.message}`)
            }
          }

          const issue = context.payload.issue
          if (!issue) {
            core.info('No issue in payload, exiting.')
            return
          }

          const closedDate = issue.closed_at ? issue.closed_at.slice(0, 10) : null
          const { ownerName, projectNumber, ownerTypeQuery } = parseProjectUrl(projectUrl)

          const projectResponse = await graphql(
            `query getProject($projectOwnerName: String!, $projectNumber: Int!) {
              ${ownerTypeQuery}(login: $projectOwnerName) {
                projectV2(number: $projectNumber) {
                  id
                  fields(first: 100) {
                    nodes {
                      ... on ProjectV2FieldCommon {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }`,
            {
              projectOwnerName: ownerName,
              projectNumber,
            },
            `Unable to find project ${projectUrl}`,
          )

          const project = projectResponse[ownerTypeQuery]?.projectV2
          if (!project) {
            throw new Error(`Project not found for ${projectUrl}`)
          }

          const field = project.fields.nodes.find((projectField) => projectField?.name === fieldName)
          if (!field) {
            throw new Error(`Field "${fieldName}" not found in project ${projectUrl}`)
          }

          const itemResponse = await graphql(
            `query getIssueProjectItems($owner: String!, $repo: String!, $issueNumber: Int!) {
              repository(owner: $owner, name: $repo) {
                issue(number: $issueNumber) {
                  projectItems(first: 50) {
                    nodes {
                      id
                      project {
                        id
                      }
                    }
                  }
                }
              }
            }`,
            {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issueNumber: issue.number,
            },
            `Unable to load project items for issue #${issue.number}`,
          )

          const projectItems = itemResponse.repository?.issue?.projectItems?.nodes ?? []
          const item = projectItems.find((projectItem) => projectItem?.project?.id === project.id)

          if (!item) {
            core.info('Issue is not in the target project, nothing to update.')
            return
          }

          if (closedDate) {
            await graphql(
              `mutation updateClosedDate($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: Date!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { date: $date }
                  }
                ) {
                  projectV2Item {
                    id
                  }
                }
              }`,
              {
                projectId: project.id,
                itemId: item.id,
                fieldId: field.id,
                date: closedDate,
              },
              `Unable to update field "${fieldName}" for issue #${issue.number}`,
            )
            core.info(`Updated ${fieldName} to ${closedDate}`)
            return
          }

          await graphql(
            `mutation clearClosedDate($projectId: ID!, $itemId: ID!, $fieldId: ID!) {
              clearProjectV2ItemFieldValue(
                input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                }
              ) {
                projectV2Item {
                  id
                }
              }
            }`,
            {
              projectId: project.id,
              itemId: item.id,
              fieldId: field.id,
            },
            `Unable to clear field "${fieldName}" for issue #${issue.number}`,
          )
          core.info(`Cleared ${fieldName}`)
