name: Check if changed files require a changelog
description: |
  Determines whether any files changed in the PR require the presence of a
  changelog entry, by checking against a list of EXEMPT path patterns.

  Logic:
    - If ALL changed files match at least one exempt pattern → changelog NOT required
    - If ANY changed file does NOT match any exempt pattern → changelog IS required

  This "exempt list" approach means that new directories added to a repo will
  require a changelog by default, which is the safer behavior. Only explicitly
  exempted paths (CI, tests, docs, etc.) skip the requirement.

  Default exempt patterns:
    - .github/**       → GitHub Actions workflows and config
    - tests/**         → Test code
    - docker-tests/**  → Docker-based integration tests
    - **/*.md          → Documentation (Markdown files anywhere in the repo)

inputs:
  changelog_exempt_paths:
    description: |
      Comma-separated list of glob patterns (minimatch-style) that identify
      files whose modification does NOT require a changelog entry.
      Each pattern is trimmed of leading/trailing whitespace before matching.

      If ALL files changed in the PR match at least one of these patterns,
      the changelog check is skipped (not required).

      If ANY changed file does NOT match any of these patterns, a changelog
      entry is required.

      Examples: ".github/**", "tests/**", "docker-tests/**", "**/*.md"
    required: false
    default: ".github/**, tests/**, docker-tests/**, **/*.md"

outputs:
  changelog_required:
    description: '"true" if at least one changed file is NOT exempt, otherwise "false".'
    value: ${{ steps.check-paths.outputs.changelog_required }}

runs:
  using: "composite"
  steps:
    - name: Check changed files against exempt path patterns
      id: check-paths
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        INPUT_CHANGELOG_EXEMPT_PATHS: ${{ inputs.changelog_exempt_paths }}
      with:
        script: |
          // ─────────────────────────────────────────────────────────────────────
          // Parse the comma-separated exempt patterns input into an array of
          // trimmed, non-empty glob patterns.
          // ─────────────────────────────────────────────────────────────────────
          const rawPatterns = process.env.INPUT_CHANGELOG_EXEMPT_PATHS || '';
          const patterns = rawPatterns
            .split(',')
            .map(p => p.trim())
            .filter(p => p.length > 0);

          if (patterns.length === 0) {
            core.warning('No changelog_exempt_paths patterns provided — all files require a changelog.');
            core.setOutput('changelog_required', 'true');
            return;
          }

          core.info('══════════════════════════════════════════════════════');
          core.info('Changelog path check');
          core.info('──────────────────────────────────────────────────────');
          core.info('Files matching these patterns are EXEMPT from the');
          core.info('changelog requirement:');
          core.info('');
          for (const pattern of patterns) {
            core.info(`  • ${pattern}`);
          }
          core.info('──────────────────────────────────────────────────────');

          // ─────────────────────────────────────────────────────────────────────
          // Retrieve the full list of files changed in this pull request.
          // Uses pagination to handle PRs with many changed files.
          // ─────────────────────────────────────────────────────────────────────
          const prNumber = context.payload.pull_request.number;
          const filesChanged = await github.paginate(github.rest.pulls.listFiles, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: prNumber,
          });

          core.info(`Files changed in PR #${prNumber}: ${filesChanged.length}`);
          core.info('');

          // ─────────────────────────────────────────────────────────────────────
          // Glob matching utility.
          //
          // Supports:
          //   - "**"  → matches any number of path segments (including zero)
          //   - "*"   → matches any characters within a single path segment
          //   - "?"   → matches exactly one character within a segment
          //   - Literal file names (exact match, e.g. "pom.xml")
          //
          // Examples:
          //   globMatch("src/main/Foo.java", "src/**")     → true
          //   globMatch(".github/workflows/ci.yml", ".github/**") → true
          //   globMatch("README.md", "**/*.md")            → true
          //   globMatch("docs/guide.md", "**/*.md")        → true
          // ─────────────────────────────────────────────────────────────────────
          function globMatch(filePath, pattern) {
            // Exact match (for patterns without any wildcards, e.g. "pom.xml")
            if (!pattern.includes('*') && !pattern.includes('?')) {
              return filePath === pattern;
            }

            // Convert glob pattern to a regex.
            // Placeholders (__GLOBSTAR_SLASH__, __GLOBSTAR__) temporarily replace
            // "**/" and "**" so that the single "*" replacement doesn't corrupt them.
            const regexStr = pattern
              .replace(/[.+^${}()|[\]\\]/g, '\\$&')
              .replace(/\*\*\//g, '__GLOBSTAR_SLASH__')
              .replace(/\*\*/g, '__GLOBSTAR__')
              .replace(/\*/g, '[^/]*')
              .replace(/\?/g, '[^/]')
              .replace(/__GLOBSTAR_SLASH__/g, '(.*/)?')
              .replace(/__GLOBSTAR__/g, '.*');

            const regex = new RegExp(`^${regexStr}$`);
            return regex.test(filePath);
          }

          // ─────────────────────────────────────────────────────────────────────
          // For each changed file, check if it matches ANY exempt pattern.
          // Files that don't match any pattern are "non-exempt" and require a
          // changelog entry.
          // ─────────────────────────────────────────────────────────────────────
          const nonExemptFiles = [];
          const exemptFiles = [];

          for (const file of filesChanged) {
            const isExempt = patterns.some(pattern => globMatch(file.filename, pattern));
            if (isExempt) {
              exemptFiles.push(file.filename);
            } else {
              nonExemptFiles.push(file.filename);
            }
          }

          // ─────────────────────────────────────────────────────────────────────
          // Log results for easy debugging in the GitHub Actions UI.
          // ─────────────────────────────────────────────────────────────────────
          if (exemptFiles.length > 0) {
            core.info('Exempt files (no changelog needed for these):');
            for (const f of exemptFiles) {
              core.info(`  ○ ${f}`);
            }
            core.info('');
          }

          if (nonExemptFiles.length > 0) {
            core.info('Non-exempt files (these require a changelog):');
            for (const f of nonExemptFiles) {
              core.info(`  ● ${f}`);
            }
            core.info('');
            core.info('══════════════════════════════════════════════════════');
            core.info('Result: changelog IS required.');
            core.setOutput('changelog_required', 'true');
          } else {
            core.info('All changed files are exempt from the changelog requirement.');
            core.info('');
            core.info('══════════════════════════════════════════════════════');
            core.info('Result: changelog is NOT required for this PR.');
            core.setOutput('changelog_required', 'false');
          }
